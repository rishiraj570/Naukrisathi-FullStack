<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Details | NaukriSaathi</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#f5f7fb;}
.back-bar{padding:16px 5%;background:#fff;border-bottom:1px solid #e5e7eb;}
.back-link{color:#16a34a;text-decoration:none;font-weight:600;font-size:14px;}
.back-link:hover{text-decoration:underline;}
.container{max-width:1000px;margin:40px auto;background:#fff;padding:40px;border-radius:15px;box-shadow:0 4px 20px rgba(0,0,0,.08);}
.company-header{display:flex;align-items:center;gap:20px;margin-bottom:30px;}
.company-logo{width:90px;height:90px;border-radius:12px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:40px;flex-shrink:0;}
.company-info h1{color:#0b1d3a;font-size:24px;}
.company-info p{color:#666;margin-top:5px;}
.badge{display:inline-block;background:#f0fdf4;color:#16a34a;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;margin-top:8px;}
.details-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-bottom:30px;}
.detail-card{background:#f8fafc;padding:15px;border-radius:10px;text-align:center;}
.detail-card h3{color:#16a34a;font-size:18px;}
.detail-card p{color:#555;font-size:13px;margin-top:4px;}
.section{margin-top:30px;}
.section h2{color:#0b1d3a;margin-bottom:15px;font-size:20px;}
.section p,.section li{color:#555;line-height:1.8;}
ul{padding-left:20px;}
li{margin-bottom:4px;}
.skills-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.skill-tag{background:#eff6ff;color:#1d4ed8;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;}
.apply-btn{display:inline-block;margin-top:30px;background:#16a34a;color:white;text-decoration:none;padding:14px 28px;border-radius:8px;font-weight:700;font-size:16px;}
.apply-btn:hover{background:#15803d;}
.loading{text-align:center;padding:60px;color:#555;font-size:16px;}
.error-state{text-align:center;padding:60px;color:#ef4444;}
#toast{position:fixed;bottom:28px;right:28px;padding:14px 22px;border-radius:10px;font-size:14px;font-weight:600;color:#fff;background:#0b1d3a;box-shadow:0 8px 24px rgba(0,0,0,0.2);transform:translateY(80px);opacity:0;transition:all 0.35s;z-index:9999;display:flex;align-items:center;gap:10px;}
@media(max-width:768px){.details-grid{grid-template-columns:repeat(2,1fr);}.company-header{flex-direction:column;text-align:center;}}
</style>
</head>
<body>

<div class="back-bar">
  <a href="jobseeker-dashboard.html" class="back-link">← Back to Dashboard</a>
</div>

<div id="main-content" class="container">
  <div class="loading">Loading job details...</div>
</div>

<div id="toast"><span id="toast-icon">✅</span><span id="toast-msg">Done!</span></div>

<script src="../api.js"></script>
<script>
  if (!isLoggedIn()) { window.location.href = '../signin.html'; }
  const user = getUser();

  const params = new URLSearchParams(window.location.search);
  const jobId  = params.get('id');

  async function loadJob() {
    const container = document.getElementById('main-content');

    if (!jobId) {
      container.innerHTML = '<div class="error-state">No job ID provided. <a href="jobseeker-dashboard.html">Go back</a></div>';
      return;
    }

    try {
      const data = await JobAPI.getById(jobId);
      const job  = data.job || data;

      const skills = job.skills || job.requiredSkills || [];
      const skillsHtml = Array.isArray(skills)
        ? skills.map(s => `<span class="skill-tag">${escHtml(s)}</span>`).join('')
        : `<span class="skill-tag">${escHtml(skills)}</span>`;

      const eligibility = job.eligibility || job.eligibilityCriteria || {};
      const canApply = !user || user.role === 'jobseeker';

      container.innerHTML = `
        <div class="company-header">
          <div class="company-logo">🏢</div>
          <div class="company-info">
            <h1>${escHtml(job.title || job.jobTitle || 'Job Title')}</h1>
            <p>${escHtml(job.companyName || job.company || '—')}</p>
            <span class="badge">${escHtml(job.jobType || job.type || 'Full Time')}</span>
          </div>
        </div>

        <div class="details-grid">
          <div class="detail-card"><h3>${escHtml(job.salary || job.salaryPackage || '—')}</h3><p>Salary</p></div>
          <div class="detail-card"><h3>${escHtml(job.location || '—')}</h3><p>Location</p></div>
          <div class="detail-card"><h3>${escHtml(job.experience || job.experienceRequired || 'Fresher')}</h3><p>Experience</p></div>
          <div class="detail-card"><h3>${escHtml(job.workMode || 'On-site')}</h3><p>Work Mode</p></div>
        </div>

        <div class="section">
          <h2>Job Description</h2>
          <p>${escHtml(job.description || job.jobDescription || 'No description provided.')}</p>
        </div>

        ${skills.length ? `<div class="section"><h2>Required Skills</h2><div class="skills-wrap">${skillsHtml}</div></div>` : ''}

        ${(eligibility.minCgpa || eligibility.branches || eligibility.graduationYear || job.minCgpa || job.eligibleBranches) ? `
        <div class="section">
          <h2>Eligibility Criteria</h2>
          <ul>
            ${job.minCgpa || eligibility.minCgpa ? `<li>Minimum CGPA: ${escHtml(job.minCgpa || eligibility.minCgpa)}</li>` : ''}
            ${job.eligibleBranches || eligibility.branches ? `<li>Eligible Branches: ${escHtml(job.eligibleBranches || eligibility.branches)}</li>` : ''}
            ${job.graduationYear || eligibility.graduationYear ? `<li>Graduation Year: ${escHtml(job.graduationYear || eligibility.graduationYear)}</li>` : ''}
          </ul>
        </div>` : ''}

        ${canApply ? `<a href="apply-job.html?id=${encodeURIComponent(jobId)}" class="apply-btn">Apply Now →</a>` : ''}
      `;
    } catch (err) {
      container.innerHTML = `<div class="error-state">Failed to load job details. <a href="jobseeker-dashboard.html">Go back</a></div>`;
    }
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  loadJob();
</script>
</body>
</html>

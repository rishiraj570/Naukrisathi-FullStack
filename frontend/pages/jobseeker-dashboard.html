<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Seeker Dashboard | NaukriSaathi</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#f5f7fb;}
.header{background:#0b1d3a;color:white;padding:20px 8%;display:flex;justify-content:space-between;align-items:center;}
.header h1{font-size:28px;}
.header-right{display:flex;align-items:center;gap:16px;}
.nav-links{display:flex;gap:12px;}
.nav-links a{color:rgba(255,255,255,0.8);text-decoration:none;font-size:14px;font-weight:500;padding:6px 10px;border-radius:6px;transition:background 0.2s;}
.nav-links a:hover{background:rgba(255,255,255,0.1);color:#fff;}
.logout-btn{background:#16a34a;color:white;border:none;padding:10px 18px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;}
.logout-btn:hover{background:#15803d;}
.container{padding:40px 8%;}
.welcome-card{background:white;padding:25px;border-radius:15px;box-shadow:0 4px 20px rgba(0,0,0,.08);margin-bottom:30px;}
.welcome-card h2{color:#0b1d3a;margin-bottom:10px;}
.welcome-card p{color:#555;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:30px;}
.stat-card{background:white;padding:25px;border-radius:15px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.08);}
.stat-card h3{font-size:32px;color:#16a34a;}
.stat-card p{margin-top:10px;color:#555;}
.section-title{color:#0b1d3a;margin-bottom:20px;}
.jobs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.job-card{background:white;padding:20px;border-radius:15px;box-shadow:0 4px 20px rgba(0,0,0,.08);}
.job-card h3{color:#0b1d3a;margin-bottom:10px;}
.job-card p{color:#666;margin-bottom:8px;font-size:14px;}
.job-card .tag{display:inline-block;background:#f0fdf4;color:#16a34a;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:10px;}
.apply-btn{display:inline-block;margin-top:10px;background:#16a34a;color:white;padding:10px 16px;border-radius:8px;text-decoration:none;font-size:14px;font-weight:600;}
.apply-btn:hover{background:#15803d;}
.loading{text-align:center;padding:40px;color:#555;}
.error-msg{text-align:center;padding:40px;color:#ef4444;}
#toast{position:fixed;bottom:28px;right:28px;padding:14px 22px;border-radius:10px;font-size:14px;font-weight:600;color:#fff;background:#0b1d3a;box-shadow:0 8px 24px rgba(0,0,0,0.2);transform:translateY(80px);opacity:0;transition:all 0.35s;z-index:9999;display:flex;align-items:center;gap:10px;}
@media(max-width:992px){.stats-grid{grid-template-columns:repeat(2,1fr);}.jobs-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:768px){.stats-grid,.jobs-grid{grid-template-columns:1fr;}.nav-links{display:none;}}
</style>
</head>
<body>

<div class="header">
  <h1>NaukriSaathi Dashboard</h1>
  <div class="header-right">
    <nav class="nav-links">
      <a href="jobseeker-profile.html">My Profile</a>
      <a href="applied-jobs.html">Applications</a>
      <a href="saved-jobs.html">Saved Jobs</a>
    </nav>
    <button class="logout-btn" onclick="handleLogout()">Logout</button>
  </div>
</div>

<div class="container">

  <div class="welcome-card">
    <h2 id="welcome-name">Welcome 👋</h2>
    <p>Track your applications, discover new jobs and grow your career.</p>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <h3 id="availableJobs">—</h3>
      <p>Available Jobs</p>
    </div>
    <div class="stat-card">
      <h3 id="appliedJobs">—</h3>
      <p>Applied Jobs</p>
    </div>
    <div class="stat-card">
      <h3 id="savedJobs">—</h3>
      <p>Saved Jobs</p>
    </div>
    <div class="stat-card">
      <h3 id="profileCompletion">—</h3>
      <p>Profile Status</p>
    </div>
  </div>

  <h2 class="section-title">Available Jobs</h2>
  <div id="jobs-container" class="jobs-grid">
    <div class="loading">Loading jobs...</div>
  </div>

</div>

<div id="toast"><span id="toast-icon">✅</span><span id="toast-msg">Done!</span></div>

<script src="../api.js"></script>
<script>
  // ── Route protection ──
  if (!isLoggedIn()) { window.location.href = '../signin.html'; }
  const user = getUser();
  if (!user || user.role !== 'jobseeker') { window.location.href = '../index.html'; }

  // ── Welcome message ──
  document.getElementById('welcome-name').textContent =
    `Welcome, ${user.firstName} ${user.lastName || ''} 👋`;

  // ── Logout ──
  async function handleLogout() {
    try { await AuthAPI.logout(); } catch (_) {}
    clearAuth();
    window.location.href = '../signin.html';
  }

  // ── Load data ──
  async function loadDashboard() {
    try {
      const [jobsData, appsData] = await Promise.allSettled([
        JobAPI.getAll(),
        ApplicationAPI.myApps()
      ]);

      const jobs = jobsData.status === 'fulfilled'
        ? (Array.isArray(jobsData.value) ? jobsData.value : jobsData.value.jobs || jobsData.value.data || [])
        : [];

      const apps = appsData.status === 'fulfilled'
        ? (Array.isArray(appsData.value) ? appsData.value : appsData.value.applications || appsData.value.data || [])
        : [];

      document.getElementById('availableJobs').textContent  = jobs.length;
      document.getElementById('appliedJobs').textContent    = apps.length;
      document.getElementById('savedJobs').textContent      = '—';
      document.getElementById('profileCompletion').textContent = 'Active';

      renderJobs(jobs);
    } catch (err) {
      document.getElementById('jobs-container').innerHTML =
        `<div class="error-msg">Failed to load jobs. Please refresh.</div>`;
    }
  }

  function renderJobs(jobs) {
    const container = document.getElementById('jobs-container');
    if (!jobs.length) {
      container.innerHTML = '<div class="loading">No jobs available at the moment.</div>';
      return;
    }
    container.innerHTML = jobs.slice(0, 9).map(job => `
      <div class="job-card">
        <span class="tag">${escHtml(job.jobType || job.type || 'Full Time')}</span>
        <h3>${escHtml(job.title || job.jobTitle || 'Untitled')}</h3>
        <p>🏢 ${escHtml(job.companyName || job.company || '—')}</p>
        <p>📍 ${escHtml(job.location || '—')}</p>
        <p>💰 ${escHtml(job.salary || job.salaryPackage || '—')}</p>
        <a href="job-details.html?id=${encodeURIComponent(job.id || job._id)}" class="apply-btn">View Details</a>
      </div>
    `).join('');
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  loadDashboard();
</script>
</body>
</html>

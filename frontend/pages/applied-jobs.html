<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Applied Jobs | NaukriSaathi</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#f5f7fb;}
.header{background:#0b1d3a;color:white;padding:20px 8%;display:flex;justify-content:space-between;align-items:center;}
.header h1{font-size:24px;}
.header-right{display:flex;gap:12px;}
.header-right a,.header-right button{color:rgba(255,255,255,0.85);text-decoration:none;font-size:14px;font-weight:500;padding:8px 14px;border-radius:6px;border:none;cursor:pointer;background:transparent;}
.header-right a:hover,.header-right button:hover{background:rgba(255,255,255,0.1);}
.container{max-width:1100px;margin:40px auto;padding:0 20px;}
.page-title{color:#0b1d3a;margin-bottom:24px;font-size:22px;}
.apps-list{display:flex;flex-direction:column;gap:16px;}
.app-card{background:white;padding:24px;border-radius:15px;box-shadow:0 4px 20px rgba(0,0,0,.08);display:flex;align-items:center;justify-content:space-between;gap:20px;}
.app-info h3{color:#0b1d3a;font-size:16px;margin-bottom:6px;}
.app-info p{color:#666;font-size:14px;margin-bottom:4px;}
.status-badge{padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;white-space:nowrap;}
.status-pending{background:#fef9c3;color:#854d0e;}
.status-reviewing{background:#eff6ff;color:#1d4ed8;}
.status-shortlisted{background:#f0fdf4;color:#15803d;}
.status-rejected{background:#fef2f2;color:#b91c1c;}
.status-selected{background:#d1fae5;color:#065f46;}
.app-date{font-size:12px;color:#9ca3af;margin-top:6px;}
.view-btn{background:#16a34a;color:#fff;padding:10px 18px;border-radius:8px;text-decoration:none;font-size:14px;font-weight:600;white-space:nowrap;}
.view-btn:hover{background:#15803d;}
.empty-state,.loading-state,.error-state{text-align:center;padding:60px;color:#666;}
.empty-state h3{color:#0b1d3a;margin-bottom:10px;}
.empty-state a{color:#16a34a;text-decoration:none;font-weight:600;}
#toast{position:fixed;bottom:28px;right:28px;padding:14px 22px;border-radius:10px;font-size:14px;font-weight:600;color:#fff;background:#0b1d3a;box-shadow:0 8px 24px rgba(0,0,0,0.2);transform:translateY(80px);opacity:0;transition:all 0.35s;z-index:9999;display:flex;align-items:center;gap:10px;}
@media(max-width:600px){.app-card{flex-direction:column;align-items:flex-start;}}
</style>
</head>
<body>

<div class="header">
  <h1>My Applications</h1>
  <div class="header-right">
    <a href="jobseeker-dashboard.html">Dashboard</a>
    <a href="saved-jobs.html">Saved Jobs</a>
    <button onclick="handleLogout()">Logout</button>
  </div>
</div>

<div class="container">
  <h2 class="page-title">Jobs You've Applied To</h2>
  <div id="apps-container">
    <div class="loading-state">Loading applications...</div>
  </div>
</div>

<div id="toast"><span id="toast-icon">✅</span><span id="toast-msg">Done!</span></div>

<script src="../api.js"></script>
<script>
  if (!isLoggedIn()) { window.location.href = '../signin.html'; }
  const user = getUser();
  if (!user || user.role !== 'jobseeker') { window.location.href = '../index.html'; }

  async function handleLogout() {
    try { await AuthAPI.logout(); } catch (_) {}
    clearAuth();
    window.location.href = '../signin.html';
  }

  function statusClass(status) {
    const map = {
      pending:     'status-pending',
      reviewing:   'status-reviewing',
      shortlisted: 'status-shortlisted',
      rejected:    'status-rejected',
      selected:    'status-selected'
    };
    return map[(status || '').toLowerCase()] || 'status-pending';
  }

  function statusLabel(status) {
    const map = {
      pending:     'Pending Review',
      reviewing:   'Under Review',
      shortlisted: 'Shortlisted',
      rejected:    'Not Selected',
      selected:    'Selected!'
    };
    return map[(status || '').toLowerCase()] || (status || 'Pending');
  }

  async function loadApplications() {
    const container = document.getElementById('apps-container');
    try {
      const data = await ApplicationAPI.myApps();
      const apps = Array.isArray(data) ? data : data.applications || data.data || [];

      if (!apps.length) {
        container.innerHTML = `
          <div class="empty-state">
            <h3>No applications yet</h3>
            <p>Start applying for jobs to track them here.</p>
            <a href="jobseeker-dashboard.html">Browse Jobs →</a>
          </div>`;
        return;
      }

      container.innerHTML = `<div class="apps-list">${apps.map(app => {
        const job   = app.job || app.jobDetails || {};
        const jobId = app.jobId || job.id || job._id || '';
        const date  = app.appliedAt || app.createdAt || '';
        const dateStr = date ? new Date(date).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' }) : '';

        return `
          <div class="app-card">
            <div class="app-info">
              <h3>${escHtml(job.title || job.jobTitle || app.jobTitle || 'Job Application')}</h3>
              <p>🏢 ${escHtml(job.companyName || job.company || app.companyName || '—')}</p>
              <p>📍 ${escHtml(job.location || '—')}</p>
              ${dateStr ? `<div class="app-date">Applied on ${dateStr}</div>` : ''}
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:10px;">
              <span class="status-badge ${statusClass(app.status)}">${statusLabel(app.status)}</span>
              ${jobId ? `<a href="job-details.html?id=${encodeURIComponent(jobId)}" class="view-btn">View Job</a>` : ''}
            </div>
          </div>`;
      }).join('')}</div>`;

    } catch (err) {
      container.innerHTML = `<div class="error-state">Failed to load applications. Please refresh.</div>`;
    }
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  loadApplications();
</script>
</body>
</html>
